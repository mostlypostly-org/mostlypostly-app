<!-- ============================
 SALON INFO
=============================== -->
<template id="tpl-edit-salon-info">
  <h3 class="text-lg font-semibold mb-4">Edit Salon Info</h3>

  <form method="POST" action="/manager/admin/update-salon-info" class="space-y-4">
    <input type="hidden" name="salon_id" value="{{salon_id}}" />

    <!-- NAME -->
    <div>
      <label class="text-xs font-semibold text-mpMuted">Salon Name</label>
      <input data-field="name" name="name"
             class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" value="{{name}}" />
    </div>

    <!-- ADDRESS -->
    <div>
      <label class="text-xs font-semibold text-mpMuted">Street Address</label>
      <input data-field="address" name="address"
             class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20"
             placeholder="123 Main St" value="{{address}}" />
    </div>

    <!-- CITY -->
    <div>
      <label class="text-xs font-semibold text-mpMuted">City</label>
      <input data-field="city" name="city"
             class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" value="{{city}}" />
    </div>

    <!-- STATE + ZIP (side by side) -->
    <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="text-xs font-semibold text-mpMuted">State</label>
      <select data-field="state" name="state" class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20 uppercase">
        <option value="">Select State</option>
        <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option><option value="AR">AR</option>
        <option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option><option value="DE">DE</option>
        <option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option><option value="ID">ID</option>
        <option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option><option value="KS">KS</option>
        <option value="KY">KY</option><option value="LA">LA</option><option value="MA">MA</option><option value="MD">MD</option>
        <option value="ME">ME</option><option value="MI">MI</option><option value="MN">MN</option><option value="MO">MO</option>
        <option value="MS">MS</option><option value="MT">MT</option><option value="NC">NC</option><option value="ND">ND</option>
        <option value="NE">NE</option><option value="NH">NH</option><option value="NJ">NJ</option><option value="NM">NM</option>
        <option value="NV">NV</option><option value="NY">NY</option><option value="OH">OH</option><option value="OK">OK</option>
        <option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option><option value="SC">SC</option>
        <option value="SD">SD</option><option value="TN">TN</option><option value="TX">TX</option><option value="UT">UT</option>
        <option value="VA">VA</option><option value="VT">VT</option><option value="WA">WA</option><option value="WI">WI</option>
        <option value="WV">WV</option><option value="WY">WY</option>
      </select>
    </div>
    <div>
      <label class="text-xs font-semibold text-mpMuted">ZIP</label>
      <input data-field="zip" name="zip"
             class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20"
             placeholder="46032" value="{{zip}}" />
    </div>
    </div><!-- end grid -->

    <!-- WEBSITE -->
    <div>
      <label class="text-xs font-semibold text-mpMuted">Website</label>
      <input data-field="website" name="website"
             class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" value="{{website}}" />
    </div>

    <!-- BOOKING URL -->
    <div>
      <label class="text-xs font-semibold text-mpMuted">Booking URL</label>
      <input data-field="booking_url" name="booking_url"
             class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" value="{{booking_url}}" />
    </div>

    <!-- INDUSTRY -->
    <div>
      <label class="text-xs font-semibold text-mpMuted">Industry</label>
      <select data-field="industry" name="industry"
              class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20">
        <option value="Hair Salon">Hair Salon</option>
        <option value="Beauty Salon">Beauty Salon</option>
        <option value="Nail Salon">Nail Salon</option>
        <option value="Spa">Spa</option>
        <option value="Barber Shop">Barber Shop</option>
        <option value="Med Spa">Med Spa</option>
      </select>
    </div>

    <!-- TIMEZONE -->
    <div>
      <label class="text-xs font-semibold text-mpMuted">Timezone</label>
      <select data-field="timezone" name="timezone"
              class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20">

        <option value="America/New_York">Eastern (US & Canada)</option>
        <option value="America/Chicago">Central (US & Canada)</option>
        <option value="America/Denver">Mountain (US & Canada)</option>
        <option value="America/Phoenix">Mountain (No DST) — Arizona</option>
        <option value="America/Los_Angeles">Pacific (US & Canada)</option>
        <option value="America/Anchorage">Alaska</option>
        <option value="Pacific/Honolulu">Hawaii</option>

      </select>
    </div>

    <!-- TONE PROFILE -->
    <div>
      <label class="text-xs font-semibold text-mpMuted">Tone Profile</label>
      <select data-field="tone_profile" name="tone_profile"
              class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20">
        <option value="Professional">Professional</option>
        <option value="Fun & Energetic">Fun & Energetic</option>
        <option value="Clean & Modern">Clean & Modern</option>
        <option value="Bold & Trendy">Bold & Trendy</option>
        <option value="Warm & Friendly">Warm & Friendly</option>
        <option value="Minimalistic">Minimalistic</option>
        <option value="Classic Salon Voice">Classic Salon Voice</option>
      </select>
    </div>

    <button class="w-full bg-mpCharcoal hover:bg-mpCharcoalDark text-white font-semibold rounded-full py-2.5 mt-4 transition-colors">
      Save Changes
    </button>
  </form>
</template>

<!-- ============================
 POSTING RULES
=============================== -->
<template id="tpl-posting-rules">
  <h3 class="text-lg font-semibold mb-1">Posting Availability</h3>
  <p class="text-xs text-mpMuted mb-4">Set the days and times your posts can be published. The scheduler will only send posts during these windows, in your salon's timezone. Toggle a day off to skip it entirely.</p>

  <form id="posting-rules-form" method="POST" action="/manager/admin/update-posting-rules" class="space-y-4">
    <input type="hidden" name="salon_id" value="{{salon_id}}" />
    <input type="hidden" id="posting-schedule-json" name="posting_schedule_json" />

    <!-- PER-DAY SCHEDULE -->
    <div id="posting-days-grid" class="space-y-2">
      <!-- rows injected by JS -->
    </div>

    <!-- SPACING -->
    <div class="pt-3 border-t border-mpBorder">
      <p class="text-xs font-semibold text-mpMuted mb-2">Spacing Between Posts</p>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs text-mpMuted">Min (minutes)</label>
          <input data-field="spacing_min" name="spacing_min" type="number" min="5" max="240"
                 class="w-full mt-1 border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" />
        </div>
        <div>
          <label class="text-xs text-mpMuted">Max (minutes)</label>
          <input data-field="spacing_max" name="spacing_max" type="number" min="5" max="240"
                 class="w-full mt-1 border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" />
        </div>
      </div>
    </div>

    <button class="w-full bg-mpCharcoal hover:bg-mpCharcoalDark text-white font-semibold rounded-full py-2.5 mt-4 transition-colors">Save Availability</button>
  </form>
</template>

<!-- ============================
 Manager RULES

<template id="tpl-manager-rules">
  <h3 class="text-lg font-semibold mb-4">Manager Rules</h3>

  <form method="POST" action="/manager/admin/update-manager-rules" class="space-y-4">
    <input type="hidden" name="salon_id" value="{{salon_id}}" />

    <div>
      <label class="text-xs font-semibold text-mpMuted">Require Manager Approval</label>
      <select data-field="require_manager_approval" name="require_manager_approval"
              class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20">
        <option value="0">Disabled</option>
        <option value="1">Enabled</option>
      </select>
    </div>

    <div>
      <label class="text-xs font-semibold text-mpMuted">Notify Member on Approval</label>
      <select data-field="notify_on_approval" name="notify_on_approval"
              class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20">
        <option value="0">Disabled</option>
        <option value="1">Enabled</option>
      </select>
    </div>

    <div>
      <label class="text-xs font-semibold text-mpMuted">Notify Member on Denial</label>
      <select data-field="notify_on_denial" name="notify_on_denial"
              class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20">
        <option value="0">Disabled</option>
        <option value="1">Enabled</option>
      </select>
    </div>

    <!-- AUTO PUBLISH -->
    <div>
      <label class="text-xs font-semibold text-mpMuted">Auto Publish</label>
      <select data-field="auto_publish" name="auto_publish"
              class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20">
        <option value="0">Disabled</option>
        <option value="1">Enabled</option>
      </select>
    </div>

    <button class="w-full bg-mpCharcoal hover:bg-mpCharcoalDark text-white font-semibold rounded-full py-2.5 mt-4 transition-colors">
      Save
    </button>
  </form>
</template>

<template id="tpl-add-stylist">
  <h3 class="text-lg font-semibold mb-4">Add Stylist</h3>

  <form method="POST" action="/manager/admin/add-stylist" class="space-y-4">
    <input type="hidden" name="salon_id" value="{{salon_id}}" />

    <div>
      <label class="text-xs font-semibold text-mpMuted">Full Name</label>
      <input data-field="name" name="name"
             class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" />
    </div>

    <div>
      <label class="text-xs font-semibold text-mpMuted">Phone</label>
      <input data-field="phone" name="phone"
             class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" />

    <div>
      <label class="text-xs font-semibold text-mpMuted">Instagram Handle</label>

</template>


<!-- ============================
 EDIT STYLIST
=============================== -->
<template id="tpl-edit-stylist">
  <div class="overflow-y-auto pr-1" style="max-height: 72vh;">

    <h3 class="text-lg font-semibold mb-4">Edit Team Member</h3>

    <!-- ── Profile Form ── -->
    <form method="POST" action="/manager/admin/update-stylist-full"
          enctype="multipart/form-data" class="space-y-3 mb-6">

      <input type="hidden" data-field="salon_id" name="salon_id" />
      <input type="hidden" data-field="id" name="id" />

      <!-- Current photo preview (populated by JS) -->
      <div id="edit-stylist-photo-preview"></div>

      <!-- Photo upload -->
      <div>
        <label class="text-xs font-semibold text-mpMuted">Profile Photo</label>
        <input type="file" name="stylist_photo" accept="image/*"
          class="w-full mt-1 text-sm text-mpMuted file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:bg-mpBg file:text-mpCharcoal file:border file:border-mpBorder hover:file:bg-white cursor-pointer" />
      </div>

      <!-- Name -->
      <div>
        <label class="text-xs font-semibold text-mpMuted">Full Name</label>
        <input data-field="name" name="name"
          class="w-full mt-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" />
      </div>

      <!-- Phone -->
      <div>
        <label class="text-xs font-semibold text-mpMuted">Phone</label>
        <div class="flex items-center gap-2 mt-1">
          <input data-field="phone" name="phone"
            class="flex-1 border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" />
          <button type="button" id="resend-welcome-btn"
            class="shrink-0 border border-mpBorder bg-mpBg hover:bg-white text-mpMuted hover:text-mpCharcoal rounded-lg px-3 py-2 text-xs font-medium transition-colors whitespace-nowrap">
            Resend Welcome
          </button>
        </div>
      </div>

      <!-- Instagram -->
      <div>
        <label class="text-xs font-semibold text-mpMuted">Instagram Handle</label>
        <div class="flex items-center gap-1 mt-1">
          <span class="text-sm text-mpMuted">@</span>
          <input data-field="instagram_handle" name="instagram_handle"
            class="w-full border border-mpBorder bg-mpBg rounded-lg px-3 py-2 text-sm text-mpCharcoal focus:border-mpAccent focus:outline-none focus:ring-2 focus:ring-mpAccent/20" />
        </div>
      </div>

      <!-- Specialties -->
      <div>
        <label class="text-xs font-semibold text-mpMuted">Specialties</label>
        <div id="edit-specialties-rows" class="space-y-2 mt-2"></div>
        <input type="hidden" id="edit-specialties-json"
          data-field="specialties_json" name="specialties_json" />
        <p class="text-[11px] text-mpMuted mt-1">Up to 5 specialties.</p>
      </div>

      <button class="w-full bg-mpCharcoal hover:bg-mpCharcoalDark text-white font-semibold rounded-full py-2.5 transition-colors">
        Save Profile
      </button>
      <button type="button" onclick="window.admin.deleteCurrentMember()"
        class="w-full border border-red-200 bg-red-50 hover:bg-red-100 text-red-600 rounded-full py-2.5 text-sm transition-colors">
        Delete Member
      </button>
    </form>

  </div>
</template>


<!-- ============================
 HASHTAGS
=============================== -->
<template id="tpl-hashtags">
  <h3 class="text-lg font-semibold mb-1">Edit Hashtags</h3>
  <p class="text-xs text-mpMuted mb-4">Max 3 total (salon tag + 2 custom). Stylists can add up to 2 more on each post.</p>

  <form id="hashtags-form" method="POST" action="/manager/admin/update-hashtags" class="space-y-4">
    <input type="hidden" name="salon_id" value="{{salon_id}}" />
    <input id="hashtags-json" name="hashtags_json" type="hidden" />

    <!-- SALON TAG (locked) -->
    <div>
      <label class="text-xs font-semibold text-mpMuted mb-1 block">Salon Tag <span class="font-normal">(auto-generated, locked)</span></label>
      <span data-field="salon_tag_display"
            class="inline-flex items-center rounded-full bg-mpAccentLight border border-mpBorder px-3 py-1 text-xs font-medium text-mpCharcoal"></span>
    </div>

    <!-- CUSTOM TAGS -->
    <div>
      <label class="text-xs font-semibold text-mpMuted mb-2 block">Custom Hashtags <span class="font-normal text-mpMuted">(up to 2)</span></label>
      <div id="hashtags-chips" class="flex flex-wrap gap-2 mb-3 min-h-[32px]"></div>
      <div class="flex gap-2">
        <input id="hashtag-input" type="text" placeholder="Type a hashtag and press Enter or Tab"
               class="flex-1 border border-gray-200 bg-gray-50 rounded-xl px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-mpAccent/20 focus:border-mpAccent" />
        <button type="button" id="hashtag-add-btn"
                class="rounded-full bg-mpAccentLight border border-mpBorder px-4 py-2 text-xs font-semibold text-mpCharcoal hover:bg-mpAccent hover:text-white transition-colors">Add</button>
      </div>
      <p class="text-[11px] text-mpMuted mt-1">Without # — it will be added automatically.</p>
    </div>

    <button type="submit" id="hashtags-save-btn"
            class="w-full bg-mpCharcoal hover:bg-mpCharcoalDark text-white font-semibold rounded-full py-2.5 mt-2 transition-colors">
      Save Hashtags
    </button>
  </form>
</template>
